<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Product preview card component</title>
    <link rel="stylesheet" href="CSS/style.css">
  </head>
  <body>
    <div class="page">
      <div class="product-card">
        <div class="product-image">
          <img src="images/image-product-desktop.jpg" alt="img">
        </div>
    <div class="product-info">
     <p class="title">Perfume</p><br>
  <p>Gabrielle<br>Essence Eau<br>De Parfum</p><br>
    <p class="description">
      A floral, solar and voluptuous interpretation 
      composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.
    </p><br>
   <span class="new-p ">$149.99</span>
   <span class="old-p">$169.99</span>
     <button><img src="images/icon-cart.svg" alt="img">  Add to cart</button>
</div></div>
</div>
  </body>
</html>
